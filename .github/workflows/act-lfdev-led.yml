name: ACT_LFDEV_POLOLU 

#on:
#  workflow_run:
#    workflows: ["ACT_LED_LF_POLOLU"]
#    types:
#      - completed

on:
  workflow_call:

jobs:
  setup:
    timeout-minutes: 60
    runs-on: [self-hosted, linux, lf-act-ast]
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v5
        with:
          path: act-test
          clean: true
          fetch-depth: 0
          submodules: recursive

      - name: Unshallow submodules (current repo)
        working-directory: ${{ github.workspace }}/act-test
        run: |
          git submodule foreach '
            echo "Fixing submodule $name"
            git fetch --unshallow || git fetch --all
            git submodule update --init --recursive
          '
      # - name: Generate app token
      #   id: app-token
      #   uses: actions/create-github-app-token@v3
      #   with:
      #     app-id: ${{ secrets.APP_ID }}
      #     private-key: ${{ secrets.APP_PRIVATE_KEY }}
      #     repositories: act-lf-testbed
      #     owner: lf-lang

      # - name: Debug token
      #   run: |
      #     echo "Token length: ${#TOKEN}"
      #     echo "Token is empty: $([[ -z "$TOKEN" ]] && echo yes || echo no)"
      #   env:
      #     TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout ACT repo
        uses: actions/checkout@v5
        with:
          repository: lf-lang/act-lf-testbed
          path: act-lf-testbed
          #token: ${{ steps.app-token.outputs.token }}
          clean: true
          fetch-depth: 0
          submodules: recursive

      - name: Unshallow submodules (ACT repo)
        working-directory: ${{ github.workspace }}/act-lf-testbed
        run: |
          git submodule foreach '
            echo "Fixing submodule $name"
            git fetch --unshallow || git fetch --all
          '

      - name: Nix Setup
        id: nix
        working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
        run: nix develop --command true

      - name: Debug git state
        if: steps.nix.outcome == 'failure'
        working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
        run: |
          git rev-parse --is-shallow-repository
          git rev-list --count HEAD

  pythonpackages:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: setup
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install opencv-python numpy pandas matplotlib
          .venv/bin/python -c "import sys; print(sys.version)"
          echo ${{ github.workspace }}
          ls

  filecleanup:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: setup
    steps:
      #- uses: actions/checkout@v5
      - name: Path Setup
        run: |
          ls ${{ github.workspace }}/act-lf-testbed 
          ls ${{ github.workspace }}/act-lf-testbed/test_lf_programs/*.sh
          ls ${{ github.workspace }}/act-lf-testbed/lf-3pi-template/
      - name: Copy Script
        working-directory: ${{ github.workspace }}/act-lf-testbed
        run: cp ${{ github.workspace }}/act-lf-testbed/test_lf_programs/*.sh ${{ github.workspace }}/act-lf-testbed/lf-3pi-template/
      - name: Run Script
        working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template/
        run: |
          chmod +x cleanup.sh
          ./cleanup.sh

  filesetup:
    #if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: filecleanup
    steps:
      - name: Copy Files
        working-directory: ${{ github.workspace }}
        run: |
          #ls && ls src/
          cp ${{ github.workspace }}/act-lf-testbed/test_lf_programs/*.py ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
          cp ${{ github.workspace }}/act-lf-testbed/test_lf_programs/Blink* ${{ github.workspace }}/act-lf-testbed/lf-3pi-template/src/

  compileblink1:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: [filesetup]
    steps:
      - name: Compile Blink - 1
        working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
        run: nix develop --command ${{ github.workspace }}/bin/lfc-dev src/Blink_1.lf
  
  flashblink1:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: [compileblink1]
    steps:
    - name: Flashing Blink
      working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
      run: nix develop --command picotool load -x bin/Blink_1.elf -f
  
  runblink1:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: [flashblink1]
    steps:
      - name: Run Test
        id: test1
        working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
        run: |
          source ${{ github.workspace }}/.venv/bin/activate
          export LD_LIBRARY_PATH=/home/aditya/workspace/act_test/work_folder/_tool/Python/3.10.20/x64/lib:$LD_LIBRARY_PATH
          PERIOD=$(python3 test_led_module.py 1)
          echo "Detected Period: $PERIOD"

# if awk "BEGIN {exit !($PERIOD >= 0.19 && $PERIOD <= 0.21)}"; then
#   echo "PASS"
# else
#   echo "FAIL"
#   exit 1
# fi
  
  plotgraph:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: [runblink1]
    if: |
      needs.runblink1.result == 'success' ||
      needs.runblink2.result == 'success' ||
      needs.runblink3.result == 'success'
    steps:
      - name: Run Test
        working-directory: ${{ github.workspace }}/act-lf-testbed/lf-3pi-template
        run: |
          source ${{ github.workspace }}/.venv/bin/activate
          export LD_LIBRARY_PATH=/home/aditya/workspace/act_test/work_folder/_tool/Python/3.10.20/x64/lib:$LD_LIBRARY_PATH
          python3 plot_led.py
       
  blinkreportupload:
    runs-on: [self-hosted, linux, lf-act-ast]
    needs: [plotgraph]
    steps:
      - name: Upload test reports
        working-directory: ${{ github.workspace }}
        run: |
          ls
      - uses: actions/upload-artifact@v4
        with:
          name: Blink-test-report
          path: |
            ${{ github.workspace }}/act-lf-testbed/lf-3pi-template/time_vs_deviation_percent.svg
            ${{ github.workspace }}/act-lf-testbed/lf-3pi-template/blink_results.csv